<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Traffic Analytics Platform — Real-time visitor intelligence dashboard">
  <title>Dashboard — Traffic Analytics Platform</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/dashboard/css/main.css">
</head>
<body>
  <div class="app-shell" id="app">

    <!-- ══ Sidebar ══════════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">📊</div>
        <span class="sidebar-logo-text">TrafficAnalytics</span>
      </div>

      <nav class="sidebar-nav">
        <span class="nav-section-label">Main</span>

        <div class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path d="M3 13.5l7-7 4 4 7-7M3 20h18"/>
          </svg>
          Overview
        </div>

        <div class="nav-item" data-page="live">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
          Live Feed
          <span class="nav-badge live" id="live-nav-badge">0</span>
        </div>

        <div class="nav-item" data-page="visitors">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
          Visitors
        </div>

        <div class="nav-item" data-page="analytics">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          Analytics
        </div>

        <span class="nav-section-label">Management</span>

        <div class="nav-item" data-page="admin">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Administration
        </div>

        <!-- Spacer -->
        <div style="flex:1"></div>

        <span class="nav-section-label">Account</span>
        <div class="nav-item" id="logout-btn">
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </div>
      </nav>
    </aside>

    <!-- ══ Topbar ════════════════════════════════════════════ -->
    <header class="topbar">
      <!-- Mobile hamburger -->
      <button class="btn btn-ghost btn-icon" id="sidebar-toggle" style="display:none">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <span class="topbar-title" id="topbar-title">Overview</span>

      <div class="topbar-actions">
        <!-- Website selector -->
        <select id="website-selector" class="form-input form-select" style="width:220px;font-size:13px">
          <option>Loading websites...</option>
        </select>

        <!-- Date range -->
        <select id="date-range" class="form-input form-select" style="width:140px;font-size:13px">
          <option value="1">Today</option>
          <option value="7" selected>Last 7 days</option>
          <option value="30">Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="365">Last year</option>
        </select>

        <!-- Live count chip -->
        <div style="display:flex;align-items:center;gap:6px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:20px;padding:5px 12px">
          <div class="live-dot"></div>
          <span style="font-size:12px;font-weight:600;color:#10b981" id="live-count">0</span>
          <span style="font-size:11px;color:var(--text-muted)">live</span>
        </div>

        <!-- User -->
        <div style="display:flex;align-items:center;gap:8px;padding:5px 12px;background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:20px">
          <div style="width:24px;height:24px;background:linear-gradient(135deg,#6366f1,#818cf8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">👤</div>
          <span style="font-size:12px;font-weight:600" id="user-display-name">—</span>
        </div>
      </div>
    </header>

    <!-- ══ Main Content ══════════════════════════════════════ -->
    <main class="main-content">
      <div id="page-content">
        <!-- Pages render here -->
        <div style="display:flex;justify-content:center;padding:80px">
          <div class="spinner"></div>
        </div>
      </div>
    </main>

  </div><!-- /app-shell -->

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ── Scripts ─────────────────────────────────────────── -->
  <!-- Core -->
  <script src="/dashboard/js/api.js"></script>
  <script src="/dashboard/js/store.js"></script>
  <script src="/dashboard/js/charts.js"></script>
  <script src="/dashboard/js/app.js"></script>

  <!-- Pages -->
  <script src="/dashboard/js/pages/dashboard.js"></script>
  <script src="/dashboard/js/pages/visitors.js"></script>
  <script src="/dashboard/js/pages/visitor-report.js"></script>
  <script src="/dashboard/js/pages/live.js"></script>
  <script src="/dashboard/js/pages/analytics.js"></script>
  <script src="/dashboard/js/pages/admin.js"></script>

  <!-- Boot -->
  <script>
    // Sidebar toggle for mobile
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await API.logout().catch(() => {});
      API.clearToken();
      window.location.href = '/login';
    });

    // Update topbar title on nav
    Store.on('*', () => {
      const page = window.location.hash.replace('#', '').split('?')[0];
      const titles = {
        dashboard: 'Overview', live: 'Live Feed',
        visitors: 'Visitors', 'visitor-report': 'Visitor Report',
        analytics: 'Analytics', admin: 'Administration',
      };
      const el = document.getElementById('topbar-title');
      if (el) el.textContent = titles[page] || 'Dashboard';
    });

    // Boot the app
    document.addEventListener('DOMContentLoaded', () => App.boot());
  </script>
</body>
</html>
